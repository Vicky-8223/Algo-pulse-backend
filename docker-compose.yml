version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: prepos-postgres

    environment:
      POSTGRES_DB: prepos_db
      POSTGRES_USER: prepos_user
      POSTGRES_PASSWORD: prepos_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: prepos-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: