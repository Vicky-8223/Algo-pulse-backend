server:
  port: ${PORT:8080}

spring:
  data:

    redis:
      url: ${REDIS_URL}
  application:
    name: prepos

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:

    hibernate:
      ddl-auto: update

    show-sql: true

    properties:

      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000